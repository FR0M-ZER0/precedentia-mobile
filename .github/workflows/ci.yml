name: Mobile CI & Standards

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
    branches: [ "dev", "hml", "main" ]

jobs:
  validate:
    name: 'Validate PR & Commits'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validar padrão do título do PR
        run: |
          # Regra: [id-task]: Descrição (com verbo no imperativo)
          PR_TITLE="${{ github.event.pull_request.title }}"
          if [[ ! "$PR_TITLE" =~ ^\[[a-zA-Z0-9-]+\]:\ [A-Z].* ]]; then
            echo "❌ Erro: O título do PR não segue o padrão do projeto."
            echo "Esperado: '[id-task]: Verbo no imperativo...'"
            exit 1
          fi
          echo "✅ Título do PR validado!"

      - name: Validar padrão do nome da Branch
        run: |
          # Regra: tipo/task-id-descrição
          BRANCH_NAME="${{ github.head_ref }}"
          if [[ ! "$BRANCH_NAME" =~ ^(feat|hotfix|fix|docs)/[a-zA-Z0-9-]+$ ]]; then
            echo "❌ Erro: O nome da branch não segue o padrão."
            echo "Esperado: 'tipo/task-id-descrição'"
            exit 1
          fi
          echo "✅ Nome da branch validado!"

      - name: Validar mensagens de commit
        run: |
          # Regra: tipo(id-task): descrição curta
          COMMITS=$(git log --format=%B ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }})
          REGEX="^(feat|fix|docs|style|refactor|chore|test|ci)\([a-zA-Z0-9-]+\):\ [A-Z].+"
          
          while read -r COMMIT_MSG; do
            if [ -z "$COMMIT_MSG" ]; then continue; fi
            if [[ ! "$COMMIT_MSG" =~ $REGEX ]]; then
               echo "❌ Erro: O commit falhou na validação: '$COMMIT_MSG'"
               exit 1
            fi
          done <<< "$COMMITS"
          echo "✅ Todos os commits seguem o padrão!"

  test-flutter:
    name: 'Flutter Test & Lint'
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Instalar Dependências
        run: flutter pub get

      - name: Analisar Código (Lint)
        run: flutter analyze

      - name: Rodar Testes Unitários
        run: flutter test