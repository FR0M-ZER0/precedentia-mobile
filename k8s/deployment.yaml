apiVersion: apps/v1
kind: Deployment
metadata:
  name: precedentia-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
      - name: web
        image: gabguimaraes/precedentia-web:latest
        ports:
        - containerPort: 80